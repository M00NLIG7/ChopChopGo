name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install libsystemd-dev
        run: sudo apt-get update && sudo apt-get install -y libsystemd-dev

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
