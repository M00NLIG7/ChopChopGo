name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install libsystemd-dev
        run: sudo apt-get update && sudo apt-get install -y libsystemd-dev

      - name: Build
        run: go build -o ChopChopGo .

      - name: Fetch Sigma rules
        run: |
          git clone --depth=1 https://github.com/SigmaHQ/sigma.git
          rm -rf rules/
          mkdir rules/
          mv sigma/rules/linux/ rules/
          rm -rf sigma/

      - name: Create release archive
        run: |
          TAG=${GITHUB_REF_NAME}
          zip -r "ChopChopGo-${TAG}-linux-amd64.zip" ChopChopGo rules/ mappings/ README.md update-rules.sh

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${GITHUB_REF_NAME}
          gh release upload "${TAG}" "ChopChopGo-${TAG}-linux-amd64.zip" --clobber
